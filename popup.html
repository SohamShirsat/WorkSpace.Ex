<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkSpace</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo"><span class="logo-icon"><img src="icons/logo.png" alt="WorkSpace" class="logo-img"></span> WorkSpace</div>
    <div class="actions">
      <button id="trackerBtn" title="Time Tracker"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button>
      <button id="scratchpadBtn" title="Scratchpad"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg></button>
      <button id="settingsBtn" title="Settings"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      <button id="addWorkspaceBtn" title="New Workspace"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    </div>
  </div>

  <div id="quickAddPanel" class="hidden">
    <div class="quick-add-header">
      <span id="quickAddTitle">New Workspace</span>
      <button id="closeQuickAddBtn"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
    <div class="quick-add-form">
      <div class="name-input-group">
        <button id="iconPickerBtn" data-icon="folder"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></button>
        <input type="text" id="newWorkspaceName" placeholder="Name your workspace...">
      </div>
      <div id="iconPicker" class="hidden"></div>
      <div class="color-picker-container" id="colorPickerContainer">
        <div class="color-swatch" data-color="grey" style="background-color: #bdc3c7;" title="Grey"></div>
        <div class="color-swatch" data-color="blue" style="background-color: #3498db;" title="Blue"></div>
        <div class="color-swatch" data-color="red" style="background-color: #e74c3c;" title="Red"></div>
        <div class="color-swatch" data-color="yellow" style="background-color: #f1c40f;" title="Yellow"></div>
        <div class="color-swatch" data-color="green" style="background-color: #2ecc71;" title="Green"></div>
        <div class="color-swatch" data-color="pink" style="background-color: #ff9ff3;" title="Pink"></div>
        <div class="color-swatch" data-color="purple" style="background-color: #9b59b6;" title="Purple"></div>
        <div class="color-swatch" data-color="cyan" style="background-color: #00cec9;" title="Cyan"></div>
      </div>
      <div class="urls-label">URLs (one per line)</div>
      <textarea id="newWorkspaceUrls" placeholder="https://..."></textarea>
      <div class="urls-label" style="margin-top: 8px;">Notes</div>
      <textarea id="newWorkspaceNotes" placeholder="Private notes about this workspace..." maxlength="500"></textarea>
      <div class="notes-footer">
        <span id="notesCharCount" class="notes-char-count"></span>
        <span id="notesSaveIndicator" class="notes-save-indicator hidden">Saved</span>
      </div>
      <div class="quick-add-options">
        <label><input type="checkbox" id="newWorkspaceGroup"> Group tabs</label>
        <label><input type="checkbox" id="newWorkspaceCloseOthers"> Close others</label>
      </div>
      <div class="quick-add-actions">
        <button id="cancelQuickAddBtn">Cancel</button>
        <button id="saveQuickAddBtn" class="primary">Save</button>
      </div>
    </div>
  </div>

  <div class="search-container">
    <span class="search-icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </span>
    <input type="text" id="searchInput" placeholder="Search tabs and workspaces..." autofocus>
  </div>

  <div id="duplicateBanner" class="hidden duplicate-banner">
    <span id="duplicateBannerText">X duplicate tabs found</span>
    <div class="duplicate-actions">
      <button id="cleanDuplicatesBtn" class="primary-btn-small">Clean Up</button>
      <button id="dismissDuplicatesBtn" class="icon-btn" title="Dismiss"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
  </div>

  <div id="emptyState" class="hidden empty-state"></div>

  <div id="searchResults" class="scroll-section hidden"></div>

  <div id="mainContent" class="scroll-section">
    <div id="openTabsSection" class="hidden">
      <div class="section-header">Open Tabs</div>
      <div id="openTabsList"></div>
    </div>
    <div class="section-header">Workspaces</div>
    <div id="workspacesList"></div>
  </div>

  <div id="timeTrackerView" class="scroll-section hidden" style="display: flex; flex-direction: column;">
    <div class="view-header">
      <div class="view-title">Time Tracker</div>
      <div class="view-toggles">
        <button id="ttTodayBtn" class="active">Today</button>
        <button id="ttWeekBtn">This Week</button>
      </div>
    </div>
    <div id="ttList" style="flex: 1;"></div>
    <div id="ttTrackingStatus" class="tracking-status">
       <span class="pulsing-dot" id="ttPulseDot"></span> <span id="ttStatusText">Tracking paused</span>
    </div>
  </div>

  <div id="scratchpadView" class="scroll-section hidden" style="display: flex; flex-direction: column;">
    <div class="view-header" style="justify-content: space-between;">
      <div class="view-title">Scratchpad</div>
      <button id="spAddCurrentBtn" class="secondary-btn-small">+ Add current tab</button>
    </div>
    <textarea id="spPasteArea" placeholder="Paste multiple URLs here..." rows="2"></textarea>
    <div id="spList" style="flex: 1;"></div>
    <div class="sp-actions">
      <button id="spOpenAllBtn" class="secondary-btn-small" style="flex:1;">Open All</button>
      <button id="spSaveWsBtn" class="secondary-btn-small" style="flex:1;">Save as Workspace</button>
      <button id="spClearBtn" class="danger-btn-small" style="flex:0.5;">Clear</button>
    </div>
  </div>

  <div class="footer">
    <button id="sequenceBtn" title="Sequence Tabs"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3v18"/><path d="m10 18-3 3-3-3"/><path d="M7 21V3"/><path d="m20 6-3-3-3 3"/></svg> Sequence</button>
    <button id="saveSessionBtn" title="Save Current Tabs"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save Session</button>
    <button id="focusToggleBtn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg> Focus</button>
  </div>

  <div id="contextMenu" class="hidden context-menu">
    <button id="contextEdit">Edit</button>
    <button id="contextDuplicate">Duplicate</button>
    <button id="contextDelete" class="danger">Delete</button>
  </div>

  <div id="deleteConfirmDialog" class="hidden dialog">
    <p>Delete this workspace?</p>
    <div class="dialog-actions">
      <button id="cancelDeleteBtn">Cancel</button>
      <button id="confirmDeleteBtn" class="danger">Delete</button>
    </div>
  </div>

  <svg id="svgNoWorkspaces" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
    <line x1="3" y1="9" x2="21" y2="9"></line>
    <line x1="9" y1="21" x2="9" y2="9"></line>
  </svg>

  <script src="popup.js"></script>
</body>
</html>
